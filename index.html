<!DOCTYPE html>
<html>
<head>
    <title>Fantasy Baseball Value Tester</title>
    <style>
        body {
            font-family: Arial, sans-serif;

        table {
            border-collapse: collapse;
            width: 800px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #f2f2f2;

        input {

            text-align: center;
        }

</head>

</html>
