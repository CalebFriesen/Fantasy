<!DOCTYPE html>
<html>
    <head>
        <title>Fantasy Baseball Value Calculator</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

    <h2>Fantasy Baseball Value Calculator</h2>

    <button onclick="calculateValues()">Calculate Values</button>

        <table id="playerTable">
            <thead>
                <tr>
                    <th>Player</th>
                    <th>R</th>
                    <th>RBI</th>
                    <th>AB</th>
                    <th>H</th>
                    <th>TB</th>
                    <th>SB</th>
                    <th>Total</th>
                </tr>
            </thead>

            <tbody>

                <tr id="avgRow">
                    <td><input class="name" value="Average"></td>
                    <td><input id="avg_R"></td>
                    <td><input id="avg_RBI"></td>
                    <td><input id="avg_AB"></td>
                    <td><input id="avg_H"></td>
                    <td><input id="avg_TB"></td>
                    <td><input id="avg_SB"></td>
                    <td>-</td>
                </tr>

                <tr>
                    <td><input class="name" value="Julio Rodriguez"></td>
                    <td><input value="39"></td>
                    <td><input value="34"></td>
                    <td><input value="157"></td>
                    <td><input value="39"></td>
                    <td><input value="153"></td>
                    <td><input value="9"></td>
                    <td class="total"></td>
                </tr>

            </tbody>
        </table>

        <script src="script.js"></script>

    </body>
</html>
